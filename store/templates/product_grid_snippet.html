{% for product in products %}
<div class="col-6 col-md-4 col-xl-3">
    <a href="{% url 'product-detail' product.id %}" class="sb-jewellery-card">
        <div class="sb-jewellery-img-stage">
            <img src="{{product.image.url}}" alt="{{ product.name }}" />
        </div>
        
        <div class="card-body p-0">
            <h5 class="sb-jewellery-product-name text-truncate">
                {{ product.name }}
            </h5>
            <p class="sb-jewellery-price-tag">
                ₹ {{ product.price }}
            </p>
        </div>
    </a>
</div>

{% empty %}
<div class="col-12 text-center py-5">
    <p class="text-muted font-weight-light">No premium items cataloged inside this collection loop vault.</p>
    <a href="/" class="btn btn-outline-dark btn-sm px-4 rounded-pill mt-2">Reset Showroom Filter</a>
</div>
{% endfor %}
