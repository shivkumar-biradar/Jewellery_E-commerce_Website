{% extends "base.html" %}
{% load static %}
{% block title %}My Wishlist{% endblock %}

{% block content %}
<style>
    .sb-jewellery-card {
        border: none !important;
        background: transparent !important;
        display: block;
        margin-bottom: 2.5rem;
    }
    .sb-jewellery-img-stage {
        background-color: #fcfaf7;
        height: 340px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        overflow: hidden;
    }
    .sb-jewellery-img-stage img {
        height: 100%;
        width: 100%;
        object-fit: cover;
    }
</style>

<div class="container my-5">
    <h3 class="mb-4 text-center">YOUR WISHLIST</h3>
    <div class="row">
        {% for item in wishlist_items %}
        <div class="col-6 col-md-4 col-xl-3">
            <div class="sb-jewellery-card">
                <a href="{% url 'product-detail' item.product.id %}">
                    <div class="sb-jewellery-img-stage">
                        <img src="{{ item.product.image.url }}" alt="" />
                    </div>
                </a>
                <div class="p-0 mt-2">
                    <h5>{{ item.product.name }}</h5>
                    <p>₹ {{ item.product.price }}</p>
                    <a href="{% url 'toggle_wishlist' %}?prod_id={{ item.product.id }}" class="btn btn-sm btn-link text-danger p-0">
                         Remove
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">Your wishlist is empty.</p>
            <a href="{% url 'homepage' %}" class="btn btn-dark btn-sm">Shop Now</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
